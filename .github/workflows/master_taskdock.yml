# Optimized: standalone build → deploy only ~30MB instead of ~300MB+
name: Build and deploy Node.js app to Azure Web App - taskdock

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install & Build
        env:
          DATABASE_URL: "file:./dev.db"
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Prepare standalone package
        run: |
          # Copy static + public into standalone
          cp -r build/static build/standalone/build/static
          cp -r public build/standalone/public 2>/dev/null || true
          # Copy prisma schema for db push on startup
          mkdir -p build/standalone/prisma
          cp prisma/schema.prisma build/standalone/prisma/
          # Zip only the standalone folder (~30MB vs ~300MB)
          cd build/standalone
          zip -r ../../release.zip . -q

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E44134D691ED4ECDBDF671C7093D4636 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B374DFB3F20644B797FB0689A2A441E2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E604146EAEC04E6F914F0F45189FE092 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taskdock'
          slot-name: 'Production'
          package: release.zip