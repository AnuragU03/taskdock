# Standalone build + Prisma-safe deployment
name: Build and deploy Node.js app to Azure Web App - taskdock

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install & Build
        env:
          DATABASE_URL: "file:./dev.db"
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Prepare standalone package
        run: |
          STANDALONE=build/standalone
          
          # Copy static assets + public folder
          cp -r build/static $STANDALONE/build/static
          cp -r public $STANDALONE/public 2>/dev/null || true
          
          # Copy Prisma schema for runtime db push
          mkdir -p $STANDALONE/prisma
          cp prisma/schema.prisma $STANDALONE/prisma/
          
          # Copy Prisma CLI (needed for db push at startup)
          cp -r node_modules/prisma $STANDALONE/node_modules/prisma 2>/dev/null || true
          cp -r node_modules/@prisma $STANDALONE/node_modules/@prisma 2>/dev/null || true
          
          # Copy generated Prisma client engine
          cp -r node_modules/.prisma $STANDALONE/node_modules/.prisma 2>/dev/null || true
          
          # Zip standalone folder
          cd $STANDALONE
          zip -r ../../release.zip . -q

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E44134D691ED4ECDBDF671C7093D4636 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B374DFB3F20644B797FB0689A2A441E2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E604146EAEC04E6F914F0F45189FE092 }}

      - name: Set Azure startup command
        run: |
          az webapp config set --name taskdock --resource-group taskdock_group \
            --startup-file "node node_modules/prisma/build/index.js db push --accept-data-loss && node server.js"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taskdock'
          slot-name: 'Production'
          package: release.zip